name: Build and Push Docker Images

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BE: ${{ github.repository }}-backend
  IMAGE_NAME_FE: ${{ github.repository }}-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        # Login solo su push in main, non sulle PR (evita push di immagini non testate)
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Backend
        id: meta-be
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BE }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./ticketing-backend
          # push solo su merge in main, sulle PR si fa solo la build (verifica che compili)
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-be.outputs.tags }}
          labels: ${{ steps.meta-be.outputs.labels }}

      - name: Extract metadata (tags, labels) for Frontend
        id: meta-fe
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FE }}

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./ticketing-frontend
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-fe.outputs.tags }}
          labels: ${{ steps.meta-fe.outputs.labels }}
          build-args: |
            VITE_API_BASE_URL=https://tua-api-url.com/api