services:
  db:
    image: postgres:15-alpine
    container_name: ticket_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: ticketdb
    ports:
      - "5433:5432" # host 5433 -> evita conflitto con un eventuale Postgres locale sulla 5432 (l'app usa comunque la rete interna db:5432)
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ticketdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./ticketing-app
      dockerfile: Dockerfile
    container_name: ticket_app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://postgres:admin@db:5432/ticketdb?schema=public
      - PORT=8080
      - NODE_ENV=production
      - SESSION_SECRET=youticket-prod-secret
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "npx prisma db push && npm start"

volumes:
  db_data:
