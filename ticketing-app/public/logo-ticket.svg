<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" role="img" aria-labelledby="yt-logo-title">
  <title id="yt-logo-title">YouTicket</title>
  <defs>
    <mask id="yt-perf" maskUnits="userSpaceOnUse">
      <rect x="8.5" y="7.5" width="15" height="17" rx="2.75" fill="#fff"/>
      <circle cx="8.5" cy="11.5" r="1.35" fill="#000"/>
      <circle cx="8.5" cy="16" r="1.35" fill="#000"/>
      <circle cx="8.5" cy="20.5" r="1.35" fill="#000"/>
      <circle cx="23.5" cy="11.5" r="1.35" fill="#000"/>
      <circle cx="23.5" cy="16" r="1.35" fill="#000"/>
      <circle cx="23.5" cy="20.5" r="1.35" fill="#000"/>
    </mask>
  </defs>
  <!-- Icon background -->
  <rect width="32" height="32" rx="8.5" fill="#0b76d1"/>
  <!-- Ticket (perforated edges show gradient) -->
  <rect x="8.5" y="7.5" width="15" height="17" rx="2.75" fill="#fff" fill-opacity="0.96" mask="url(#yt-perf)"/>
  <!-- Fold / perforation line -->
  <path d="M16 9.75v12.5" stroke="#0b76d1" stroke-opacity="0.38" stroke-width="1.2" stroke-linecap="round" stroke-dasharray="1.85 2.35"/>
  <!-- Resolved check (right panel) -->
  <path
    d="M17.85 15.35l1.55 1.55 3.35-3.35"
    stroke="#0b76d1"
    stroke-width="1.65"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
